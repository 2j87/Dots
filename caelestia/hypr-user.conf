# ~/.config/caelestia/hypr-user.conf
# ──────────────────────────────────────────────────────────────────────
# Caelestia üzerinden Hyprland'a eklenen kişisel tweakler.
# Bu dosya caelestia'nın kendi hyprland.conf'u tarafından source edilir.
#
# Upstream config'i değiştirmeden Hyprland ayarı eklemek istersen buraya yaz.
# Örnek kullanımlar:

# ── Ekran titremesi sorunu yaşarsan VRR'yi kapat ──────────────────────
# misc {
#     vrr = 0
# }

# ── Özel pencere kuralı eklemek istersen ─────────────────────────────
# windowrulev2 = float, class:^(uygulamaIsmi)$

# ── Özel keybind eklemek istersen ─────────────────────────────────────
# bind = SUPER, X, exec, komut
