# /etc/sddm.conf
# ──────────────────────────────────────────────────────────────────────
# SDDM ana konfigürasyonu.
# install.sh tarafından /etc/sddm.conf olarak kopyalanır.

[Theme]
Current=sddm-astronaut-theme

[Autologin]
# Otomatik giriş — güvenlik riski, kapalı bırak
# User=kerem
# Session=hyprland

[General]
# Wayland oturumu için
DisplayServer=wayland
GreeterEnvironment=QT_WAYLAND_SHELL_INTEGRATION=layer-shell

[Users]
# Minimum UID (sistem kullanıcılarını gizle)
MinimumUid=1000
MaximumUid=60000
