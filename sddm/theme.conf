# /usr/share/sddm/themes/sddm-astronaut-theme/Themes/black_hole.conf
# ──────────────────────────────────────────────────────────────────────
# Black hole teması — caelestia ile uyumlu özelleştirmeler.
# install.sh bu dosyayı tema dizinine kopyalar.
#
# Önizleme için:
#   sddm-greeter-qt6 --test-mode --theme /usr/share/sddm/themes/sddm-astronaut-theme/
#
# Kaynak: Keyitdev/sddm-astronaut-theme — black_hole.conf bazlı

# ── ARKA PLAN ─────────────────────────────────────────────────────────
Background="Backgrounds/black_hole.png"
# Animasyonlu wallpaper kullanmak istersen:
# Background="Backgrounds/black_hole.mp4"

# ── FONT ──────────────────────────────────────────────────────────────
# Caelestia mono font ile uyumlu
Font="CaskaydiaCove NF"
FontSize="12"
# Başlık fontu (saat, hoşgeldiniz mesajı)
HeaderFont="Rubik"
HeaderFontSize="24"

# ── RENKLER ───────────────────────────────────────────────────────────
# Catppuccin Mocha — caelestia varsayılan renk paleti
MainColor="#CDD6F4"           # metin rengi (text)
AccentColor="#CBA6F7"         # vurgu rengi (mauve — caelestia primary)
BackgroundColor="#1E1E2E"     # arka plan kartı
CardColor="#313244"           # giriş kutusu arka plan
BorderColor="#45475A"         # kenarlık rengi
ErrorColor="#F38BA8"          # hata mesajı

# ── OPAÇITE ───────────────────────────────────────────────────────────
# frosted glass efekti — caelestia panel blur ile uyumlu
BackgroundOpacity="0.8"
CardOpacity="0.7"

# ── GİRİŞ ALANI ───────────────────────────────────────────────────────
# Caelestia'nın rounding=12 değeriyle uyumlu
CornerRadius="12"
PasswordFieldWidth="300"
UserFieldWidth="300"

# ── YERLEŞIM ──────────────────────────────────────────────────────────
# Merkez konumlandırma
LoginFieldsBesideAvatar="false"
HaveFormBackground="true"
PartialBlur="true"
FullBlur="false"
BlurRadius="64"

# ── SİSTEM BUTONLARI ──────────────────────────────────────────────────
ForceHideCompletePassword="false"
RevertLayout="false"
ForceRightToLeft="false"
HideSystemButtons="false"
