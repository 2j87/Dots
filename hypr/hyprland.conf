#
# Ana giriş noktası — bu dosya sadece source satırları içerir.
# Tüm konfigürasyon alt dosyalara bölünmüştür.
# Düzenlemek istediğin şeye göre ilgili dosyaya git.

# ── CORE ──────────────────────────────────────────────────────────────
source = ~/.config/hypr/core/env.conf
source = ~/.config/hypr/core/variables.conf
source = ~/.config/hypr/core/monitor.conf

# ── VISUAL ────────────────────────────────────────────────────────────
source = ~/.config/hypr/visual/general.conf
source = ~/.config/hypr/visual/decoration.conf
source = ~/.config/hypr/visual/animations.conf
source = ~/.config/hypr/visual/misc.conf

# ── INPUT ─────────────────────────────────────────────────────────────
source = ~/.config/hypr/input/keyboard.conf
source = ~/.config/hypr/input/gestures.conf

# ── RULES ─────────────────────────────────────────────────────────────
source = ~/.config/hypr/rules/windowrules.conf
source = ~/.config/hypr/rules/layerrules.conf

# ── AUTOSTART ─────────────────────────────────────────────────────────
source = ~/.config/hypr/autostart/system.conf
source = ~/.config/hypr/autostart/shell.conf

# ── KEYBINDS ──────────────────────────────────────────────────────────
source = ~/.config/hypr/input/binds.conf

# ── CAELESTIA RENK ŞEMASI ─────────────────────────────────────────────
# Bu dosya caelestia-cli tarafından otomatik yönetilir. Elle dokunma.
source = ~/.config/hypr/scheme/current.conf
