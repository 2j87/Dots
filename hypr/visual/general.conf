# ── GENERAL.CONF ──────────────────────────────────────────────────────
# Pencere yönetiminin temel ayarları: border, gap, layout.
# Caelestia shell kendi border rengini scheme/current.conf üzerinden yazar.

general {
    # Border
    border_size        = 2
    # col.active_border ve col.inactive_border scheme/current.conf'tan gelir

    # Pencereler arası boşluk (iç)
    gaps_in            = 4

    # Ekran kenarlarıyla boşluk (dış)
    # CSS sözdizimi destekleniyor: üst sağ alt sol
    gaps_out           = 8

    # Border üzerinde sürükleyerek yeniden boyutlandırma
    resize_on_border   = true

    # Layout: dwindle veya master
    layout             = dwindle

    # Tearing (oyun performansı için — caelestia aktif pencerede açar)
    allow_tearing      = false
}

# ── DWINDLE LAYOUT ────────────────────────────────────────────────────
dwindle {
    pseudotile          = true   # SUPER+P ile pseudo tile toggle
    preserve_split      = true   # split yönünü koru
    smart_split         = false
    smart_resizing      = true
}

# ── MASTER LAYOUT ─────────────────────────────────────────────────────
# Aktif değil ama referans olarak:
master {
    new_status          = slave
    mfact               = 0.55
}
