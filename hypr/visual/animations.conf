# ── ANIMATIONS.CONF ───────────────────────────────────────────────────
# Animasyon sistemi.
# Sözdizimi: animation = ISIM, AKTIF, HIZ(desisaniye), EĞRI [,STIL]
# 1 desisaniye = 100ms | Örnek: hiz=3 → 300ms
#
# Bezier eğri tanımı: bezier = ISIM, x0, y0, x1, y1
# Online araç: https://cssportal.com/css-cubic-bezier-generator/

animations {
    enabled = true
    workspace_wraparound = false
}

# ── BEZIER EĞRİLERİ ───────────────────────────────────────────────────
# Genel akıcı eğriler
bezier = smoothOut,   0.36, 0,    0.66, -0.56
bezier = smoothIn,    0.25, 1,    0.5,  1
bezier = overshot,    0.05, 0.9,  0.1,  1.05
bezier = linear,      0.0,  0.0,  1.0,  1.0

# Caelestia tarzı — yumuşak ve hızlı
bezier = caelSmooth,  0.4,  0.0,  0.2,  1.0    # Material You standart
bezier = caelSharp,   0.2,  0.0,  0.0,  1.0    # hızlı giriş
bezier = caelBounce,  0.34, 1.56, 0.64, 1.0    # hafif bounce çıkış

# ── PENCERE ANİMASYONLARI ─────────────────────────────────────────────
animation = windows,    1, 3,   caelSmooth, slide
animation = windowsIn,  1, 3,   caelSmooth, popin 80%
animation = windowsOut, 1, 2,   caelSharp,  popin 80%
animation = windowsMove, 1, 3,  caelSmooth

# ── FADE ANİMASYONLARI ────────────────────────────────────────────────
animation = fade,       1, 3,   caelSmooth
animation = fadeIn,     1, 3,   caelSmooth
animation = fadeOut,    1, 2,   caelSharp
animation = fadeSwitch, 1, 2,   caelSmooth
animation = fadeShadow, 1, 3,   caelSmooth
animation = fadeDim,    1, 3,   caelSmooth
animation = fadeLayers, 1, 3,   caelSmooth

# ── WORKSPACE ANİMASYONLARI ───────────────────────────────────────────
# slidevert → dikey geçiş (mevcut yapından gelen tercih)
animation = workspaces,    1, 4, caelSmooth, slidevert
animation = workspacesIn,  1, 4, caelSmooth, slidevert
animation = workspacesOut, 1, 4, caelSharp,  slidevert

# Special workspace (scratchpad gibi)
animation = specialWorkspace, 1, 4, caelSmooth, slidevert

# ── KATMAN ANİMASYONLARI (Caelestia shell panelleri) ──────────────────
# Caelestia'nın bar/dashboard/launcher/sidebar'ı layer olarak açılır
animation = layers,    1, 3, caelSmooth, slide
animation = layersIn,  1, 3, caelSmooth, slide
animation = layersOut, 1, 2, caelSharp,  fade

# ── BORDER ANİMASYONU ─────────────────────────────────────────────────
# loop stili sürekli render gerektirir — pil/GPU için dikkatli kullan
# animation = borderangle, 1, 8, linear, loop
