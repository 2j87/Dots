# ── DECORATION.CONF ───────────────────────────────────────────────────
# Pencere görünümü: köşe yuvarlaması, blur, shadow, opaklık.
# Caelestia shell bu değerlerle uyumlu çalışacak şekilde ayarlandı.

decoration {
    # ── KÖŞE YUVARLAMA ────────────────────────────────────────────────
    rounding       = 12
    rounding_power = 2.0   # 2.0 = daire, 4.0 = squircle

    # ── OPAÇITE ───────────────────────────────────────────────────────
    active_opacity   = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    # ── DIM (Aktif olmayan pencere karartma) ──────────────────────────
    dim_inactive   = false
    dim_strength   = 0.15
    dim_special    = 0.3    # special workspace açıkken arka plan karartma

    # ── BLUR ──────────────────────────────────────────────────────────
    blur {
        enabled            = true
        size               = 6       # bulanıklık mesafesi
        passes             = 3       # geçiş sayısı (daha fazla = daha iyi kalite, daha ağır)
        ignore_opacity     = true
        new_optimizations  = true
        xray               = false   # floating pencereler altındaki tiled'ı gösterme
        noise              = 0.02
        contrast           = 0.9
        brightness         = 0.85
        vibrancy           = 0.17
        vibrancy_darkness  = 0.0
        special            = false   # special workspace blur (ağır, kapalı)
        popups             = true    # sağ tık menüsü vb.
    }

    # ── SHADOW ────────────────────────────────────────────────────────
    shadow {
        enabled       = true
        range         = 20
        render_power  = 3
        color         = rgba(0,0,0,0.4)
        color_inactive = rgba(0,0,0,0.2)
        offset        = 0 4
        scale         = 1.0
    }
}
