# ── MISC.CONF ─────────────────────────────────────────────────────────
# Çeşitli ayarlar ve Caelestia uyumluluk tweakleri.
# Sorun yaşarsan ilk bakacağın yer burası.

misc {
    # Hyprland arka plan logosu/anime — kapalı (caelestia kendi bg'sini koyar)
    disable_hyprland_logo   = true
    force_default_wallpaper = 0

    # VFR: boşta ekstra frame render etme (pil tasarrufu)
    vfr = true

    # VRR: ekran titremesi yaşarsan 0 yap (caelestia FAQ'dan)
    # 0 = kapalı | 1 = açık | 2 = fullscreen'de açık | 3 = game'de açık
    vrr = 0

    # Pencere aktivasyon isteğinde odaklanma (bildirimlerden açılan pencereler)
    focus_on_activate = false

    # Arka planda çalışan pencerelerin FPS limiti (performans)
    render_unfocused_fps = 30

    # Orta tık yapıştırma (primary selection)
    middle_click_paste = false

    # Ekran kapalıyken mouse/tuş ile uyandırma
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true

    # İlk workspace takibi (uygulama hangi workspace'den açıldı)
    initial_workspace_tracking = 1
}

# ── OPENGL / NVIDIA ───────────────────────────────────────────────────
opengl {
    # NVIDIA GPU'larda ekran titremesini azaltır
    # Performans maliyeti var — sorun yoksa kapalı bırak
    nvidia_anti_flicker = false
}

# ── RENDER ────────────────────────────────────────────────────────────
render {
    direct_scanout = false   # titreme yaşarsan false tut
}

# ── XWAYLAND ──────────────────────────────────────────────────────────
xwayland {
    enabled              = true
    use_nearest_neighbor = false  # bulanık değil, temiz ölçekleme
    force_zero_scaling   = false
}

# ── CURSOR ────────────────────────────────────────────────────────────
cursor {
    inactive_timeout   = 5      # 5 saniye hareketsizlikte cursor gizle
    no_warps           = false
    enable_hyprcursor  = true   # hyprcursor tema desteği
    sync_gsettings_theme = true
}

# ── BINDS ─────────────────────────────────────────────────────────────
binds {
    workspace_back_and_forth    = true   # aynı workspace'e basınca öncekine dön
    allow_workspace_cycles      = true
    window_direction_monitor_fallback = true
}

