# ── HYPRLOCK.CONF ─────────────────────────────────────────────────────
# Kilit ekranı konfigürasyonu.
# Caelestia'nın kendi lock modülü (modules/lock/) bu ekranın üstüne
# bir katman olarak bindirilir — bu dosya altta kalan temel lock'tur.
#
# Renkler scheme/current.conf ile uyumlu tutulmuştur.

general {
    disable_loading_bar   = true
    hide_cursor           = true
    grace                 = 0          # kilit sonrası bekleme (saniye)
    no_fade_in            = false
    no_fade_out           = false
    ignore_empty_input    = false
    text_trim             = true
}

# ── ARKA PLAN ─────────────────────────────────────────────────────────
background {
    monitor     =
    path        = screenshot          # kilitleme anında ekran görüntüsü al
    blur_passes = 3
    blur_size   = 7
    noise       = 0.0117
    contrast    = 0.8916
    brightness  = 0.7
    vibrancy    = 0.1696
}

# ── GİRİŞ ALANI ───────────────────────────────────────────────────────
input-field {
    monitor         =
    size            = 300 55
    outline_thickness = 2
    dots_size       = 0.25
    dots_spacing    = 0.2
    dots_center     = true
    outer_color     = rgba(cba6f7ff)
    inner_color     = rgba(1e1e2ecc)
    font_color      = rgba(cdd6f4ff)
    fade_on_empty   = true
    fade_timeout    = 2000
    placeholder_text = <i>Şifre...</i>
    hide_input      = false
    rounding        = 12
    check_color     = rgba(a6e3a1ff)
    fail_color      = rgba(f38ba8ff)
    fail_text       = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color  = rgba(f9e2afff)
    position        = 0, -80
    halign          = center
    valign          = center
}

# ── SAAT ──────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(cdd6f4ff)
    font_size   = 72
    font_family = Rubik Light
    position    = 0, 120
    halign      = center
    valign      = center
}

# ── TARİH ─────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color       = rgba(bac2decc)
    font_size   = 18
    font_family = Rubik
    position    = 0, 40
    halign      = center
    valign      = center
}
