# ── HYPRPAPER.CONF ────────────────────────────────────────────────────
# Wallpaper daemon konfigürasyonu.
# Caelestia kurulduktan sonra bu dosyayı elle düzenleme.
# Wallpaper'ı şu komutla ayarla:
#   caelestia wallpaper -f ~/Pictures/Wallpapers/resim.jpg
#
# Caelestia, hyprpaper'ı IPC üzerinden kontrol eder.
# Bu dosya sadece ilk başlangıç için gereklidir.

# ── IPC ───────────────────────────────────────────────────────────────
ipc = on   # caelestia'nın wallpaper komutları için zorunlu

# ── PRELOAD ───────────────────────────────────────────────────────────
# Başlangıçta yüklenecek wallpaper.
# Caelestia kurulumundan önce geçici olarak kullanılır.
# preload = ~/Pictures/Wallpapers/default.jpg

# ── WALLPAPER ATAMA ───────────────────────────────────────────────────
# wallpaper = eDP-1, ~/Pictures/Wallpapers/default.jpg
# Tüm monitörler için:
# wallpaper = , ~/Pictures/Wallpapers/default.jpg

# ── SPLASH YAZI ───────────────────────────────────────────────────────
splash = false
