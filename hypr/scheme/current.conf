# ── SCHEME/CURRENT.CONF ───────────────────────────────────────────────
# Bu dosya caelestia-cli tarafından otomatik olarak yönetilir.
# Elle düzenleme yapma — bir sonraki 'caelestia scheme set' komutu
# bu dosyanın üzerine yazar.
#
# İlk kurulumda varsayılan renkler burada tanımlıdır.
# Caelestia kurulduktan sonra şu komutla dinamik temaya geç:
#   caelestia wallpaper -f ~/Pictures/Wallpapers/resim.jpg
#   caelestia scheme set -n dynamic

# ── VARSAYILAN BORDER RENKLERİ ────────────────────────────────────────
# Caelestia scheme sistemi bu değerleri kendi renk tokenlarıyla değiştirir.

general {
    col.active_border   = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244ff)
}
