# ── AUTOSTART/SYSTEM.CONF ─────────────────────────────────────────────
# Sistem seviyesinde başlatılan servisler.
# Bunlar Hyprland'ın kendisinden bağımsız, altyapı servisleridir.
#
# exec-once = sadece oturum açılışında bir kez çalıştır
# exec       = config reload edildiğinde de yeniden çalıştır

# ── DBUS / PORTAL ─────────────────────────────────────────────────────
# Wayland için XDG Desktop Portal (ekran paylaşımı, dosya diyalogları vb.)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/xdg-desktop-portal-hyprland &
exec-once = /usr/lib/xdg-desktop-portal &

# ── GÜVENLİK / AUTH ───────────────────────────────────────────────────
# Polkit: sudo gerektiren GUI uygulamaları için kimlik doğrulama ajanı
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── SES ───────────────────────────────────────────────────────────────
exec-once = pipewire
exec-once = pipewire-pulse
exec-once = wireplumber

# ── AĞLANMA ───────────────────────────────────────────────────────────
exec-once = nm-applet --indicator &

# ── BLUETOOTH ─────────────────────────────────────────────────────────
# exec-once = blueman-applet &

# ── PANOCTESİ ─────────────────────────────────────────────────────────
# cliphist: panoya kopyalanan her şeyi kaydeder
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── IDLE / LOCK ───────────────────────────────────────────────────────
# hypridle: boşta kilit ekranı ve DPMS yönetimi
exec-once = hypridle

# ── GNOME SETTİNGS DAEMON ─────────────────────────────────────────────
# GTK teması, cursor teması ve gsettings senkronizasyonu için
exec-once = /usr/lib/gsd-xsettings &
