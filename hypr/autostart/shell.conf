# ── AUTOSTART/SHELL.CONF ──────────────────────────────────────────────
# Caelestia shell ve görsel katman servisleri.
# Sistem servislerinden ayrı tutuldu — sorun gidermeyi kolaylaştırır.

# ── WALLPAPER ─────────────────────────────────────────────────────────
# hyprpaper: wallpaper daemon.
# Wallpaper ayarı shell.json → paths.wallpaperDir üzerinden
# caelestia wallpaper komutu ile yapılır.
exec-once = hyprpaper

# ── CAELESTIA SHELL ───────────────────────────────────────────────────
# Shell'i başlat. -d = daemon modunda çalıştır (arka planda).
# Eğer shell başlamazsa: journalctl --user -u caelestia-shell
exec-once = caelestia shell -d

# ── CAELESTIA IDLE MONİTÖRÜ ──────────────────────────────────────────
# Shell'in kendi idle yönetimi için (shell.json → general.idle ile yapılandırılır)
# hypridle zaten system.conf'ta başlatılıyor, bu satır ayrıca gerekmez.

# ── CAELESTIA PENCERE YENİDEN BOYUTLANDIRICI ──────────────────────────
# Sağ kenar sürükleyerek pencere boyutlandırma daemon'ı
exec-once = caelestia resizer

# ── FOOT SUNUCUSU ─────────────────────────────────────────────────────
# foot --server: terminali sunucu modunda başlat (hızlı açılış için)
exec-once = foot --server
