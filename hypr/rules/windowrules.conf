# ── WINDOWRULES.CONF ──────────────────────────────────────────────────
# Pencere kuralları.
# Sözdizimi: windowrulev2 = kural, eşleşme_koşulu
#
# Eşleşme: class, title, workspace, floating, fullscreen, pinned vb.
# Mevcut pencereleri görmek için: hyprctl clients

# ── CAELESTIA SHELL PENCERELERİ ───────────────────────────────────────
# Shell'in kendi panelleri layer olarak açılır, window rule gerekmez.
# Ama shell içinden açılan araçlar için:

# Hyprpicker (renk seçici)
windowrulev2 = float,           class:^(hyprpicker)$
windowrulev2 = center,          class:^(hyprpicker)$
windowrulev2 = size 400 500,    class:^(hyprpicker)$

# Swappy (screenshot editörü)
windowrulev2 = float,           class:^(swappy)$
windowrulev2 = center,          class:^(swappy)$
windowrulev2 = size 800 600,    class:^(swappy)$

# Pavucontrol (ses ayarları)
windowrulev2 = float,           class:^(pavucontrol)$
windowrulev2 = center,          class:^(pavucontrol)$
windowrulev2 = size 700 500,    class:^(pavucontrol)$

# ── DOSYA YÖNETİCİSİ ──────────────────────────────────────────────────
windowrulev2 = float,           class:^(thunar)$, title:^(File Operation Progress).*$
windowrulev2 = float,           class:^(thunar)$, title:^(Confirm to replace files).*$
windowrulev2 = center,          class:^(thunar)$, title:^(File Operation Progress).*$

# ── ÖZEL WORKSPACE'LER (caelestia toggle) ─────────────────────────────
windowrulev2 = workspace special:sysmon, class:^(btop)$, title:^(btop)$
windowrulev2 = float,                   class:^(btop)$, title:^(btop)$
windowrulev2 = size 1200 800,           class:^(btop)$, title:^(btop)$
windowrulev2 = center,                  class:^(btop)$, title:^(btop)$

# ── GENEL FLOATING KURALLAR ───────────────────────────────────────────
# Küçük diyaloglar daima floating
windowrulev2 = float,   class:^(.*)$, title:^(Open File)$
windowrulev2 = float,   class:^(.*)$, title:^(Open Folder)$
windowrulev2 = float,   class:^(.*)$, title:^(Save As)$
windowrulev2 = float,   class:^(.*)$, title:^(File Upload)$
windowrulev2 = center,  class:^(.*)$, title:^(Open File)$
windowrulev2 = center,  class:^(.*)$, title:^(Open Folder)$
windowrulev2 = center,  class:^(.*)$, title:^(Save As)$
windowrulev2 = center,  class:^(.*)$, title:^(File Upload)$

# ── BLUR / SAYDAMLIK KURALLARı ─────────────────────────────────────────
# Terminal hafif saydam
windowrulev2 = opacity 0.92 override 0.85 override, class:^(foot)$

# ── XWayland UYUMLULUK ────────────────────────────────────────────────
windowrulev2 = xwaylandpersistence, class:^(steam)$
