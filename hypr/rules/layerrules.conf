# ── LAYERRULES.CONF ───────────────────────────────────────────────────
# Katman (layer surface) kuralları.
# Caelestia shell panelleri layer olarak render edilir —
# bu kurallar blur ve animasyonlarını kontrol eder.
#
# Katman isimlerini görmek için: hyprctl layers
# Sözdizimi: layerrule = kural, namespace

# ── CAELESTIA SHELL KATMANLARı ────────────────────────────────────────
# Bar
layerrule = blur,       caelestia:bar
layerrule = xray off,   caelestia:bar
layerrule = ignorealpha 0.5, caelestia:bar

# Dashboard (sol panel)
layerrule = blur,       caelestia:dashboard
layerrule = xray off,   caelestia:dashboard
layerrule = ignorealpha 0.5, caelestia:dashboard
layerrule = animation slide left, caelestia:dashboard

# Launcher
layerrule = blur,       caelestia:launcher
layerrule = xray off,   caelestia:launcher
layerrule = ignorealpha 0.5, caelestia:launcher

# Sidebar (sağ panel — bildirimler)
layerrule = blur,       caelestia:sidebar
layerrule = xray off,   caelestia:sidebar
layerrule = ignorealpha 0.5, caelestia:sidebar
layerrule = animation slide right, caelestia:sidebar

# OSD (ses/parlaklık göstergesi)
layerrule = blur,       caelestia:osd
layerrule = ignorealpha 0.3, caelestia:osd

# Session (kapanış menüsü)
layerrule = blur,       caelestia:session
layerrule = ignorealpha 0.5, caelestia:session

# Lock screen
layerrule = blur,       caelestia:lock
layerrule = ignorealpha 0.3, caelestia:lock

# Notifications
layerrule = blur,       caelestia:notifications
layerrule = ignorealpha 0.3, caelestia:notifications

# Utilities (toast bildirimleri)
layerrule = blur,       caelestia:utilities
layerrule = ignorealpha 0.2, caelestia:utilities

# ── DİĞER KATMANLARı ──────────────────────────────────────────────────
# gtk-layer-shell tabanlı uygulamalar
layerrule = blur,       gtk-layer-shell
layerrule = ignorealpha 0.3, gtk-layer-shell

# Fuzzel (emoji/clipboard picker)
layerrule = blur,       fuzzel
layerrule = ignorealpha 0.3, fuzzel
