# ── HYPRIDLE.CONF ─────────────────────────────────────────────────────
# Boşta kalma ve kilit ekranı yönetimi.
# Caelestia'nın shell.json → general.idle ayarları ile paralel çalışır.
# Shell'in kendi idle sistemi varsa bu dosyayı sadeleştirebilirsin.
#
# Sözdizimi: timeout = <saniye>, <komut> [, <geri dön komutu>]

general {
    lock_cmd        = pidof hyprlock || hyprlock   # zaten açıksa tekrar açma
    before_sleep_cmd = loginctl lock-session        # uyku öncesi kilitle
    after_sleep_cmd  = hyprctl dispatch dpms on    # uyanınca ekranı aç
    ignore_dbus_inhibit = false                     # ses çalarken kilitleme
}

# ── TIMEOUT ZINCIRI ───────────────────────────────────────────────────

# 3 dakika: ekranı karart (dpms off değil, sadece dim)
listener {
    timeout  = 150
    on-timeout = brightnessctl -s set 20%   # parlaklığı düşür
    on-resume  = brightnessctl -r           # parlaklığı geri yükle
}

# 3 dakika: kilitle
listener {
    timeout  = 180
    on-timeout = loginctl lock-session
}

# 5 dakika: ekranı kapat (DPMS off)
listener {
    timeout  = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 10 dakika: askıya al
listener {
    timeout  = 600
    on-timeout = systemctl suspend-then-hibernate
}
