# ── ENV.CONF ──────────────────────────────────────────────────────────
# Wayland ve uygulama ortam değişkenleri.
# Buradaki değişkenler Hyprland başladığında sisteme enjekte edilir.

# ── WAYLAND ───────────────────────────────────────────────────────────
env = WAYLAND_DISPLAY,wayland-1
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_CURRENT_DESKTOP,Hyprland

# ── QT ────────────────────────────────────────────────────────────────
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# ── GTK ───────────────────────────────────────────────────────────────
env = GDK_BACKEND,wayland,x11,*

# ── ELECTRON / CHROMIUM ───────────────────────────────────────────────
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ── MOZILLA ───────────────────────────────────────────────────────────
env = MOZ_ENABLE_WAYLAND,1

# ── NVIDIA OPTIMUS / HYBRID GPU ───────────────────────────────────────
# ROG Strix G16 — NVIDIA + Intel hybrid
# Bu satırlar Hyprland'ın NVIDIA ile düzgün çalışması için zorunlu.
#
# Sorun yaşarsan sırayla dene:
#   1. WLR_NO_HARDWARE_CURSORS=1 yap (cursor görünmüyorsa)
#   2. __GL_GSYNC_ALLOWED=0 ekle (titreme varsa)

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __NV_PRIME_RENDER_OFFLOAD,1
env = __VK_LAYER_NV_optimus,NVIDIA_only
env = WLR_NO_HARDWARE_CURSORS,0

# ── CAELESTIA / QUICKSHELL ────────────────────────────────────────────
# İkon teması — Caelestia ile uyumlu
env = QS_ICON_THEME,Papirus-Dark

# ── CURSOR ────────────────────────────────────────────────────────────
env = HYPRCURSOR_SIZE,24
env = XCURSOR_SIZE,24
