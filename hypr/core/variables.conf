# ── VARIABLES.CONF ────────────────────────────────────────────────────
# Hyprland değişken tanımları.
# Buradaki $değişkenler binds.conf ve diğer dosyalarda kullanılır.
# Caelestia'nın keybind IPC sistemi de bu değişkenlere bağlıdır.

# ── UYGULAMALAR ───────────────────────────────────────────────────────
$terminal    = foot
$browser     = zen-browser
$editor      = code
$filemanager = thunar
$launcher    = caelestia shell drawers toggle launcher

# ── CAELESTIA SHELL KISAYOLLARI ───────────────────────────────────────
# Caelestia'nın IPC sistemi global shortcut alt yapısı üzerinde çalışır.
# Aşağıdaki değişkenler binds.conf içinde kullanılır.
$kbSession        = CTRL ALT, Delete
$kbShowSidebar    = SUPER, N
$kbScreenshot     = , Print
$kbScreenshotArea = SUPER SHIFT, S
$kbRecord         = SUPER ALT, R
$kbClipboard      = SUPER, V
$kbEmoji          = SUPER, Period
$kbColorPicker    = SUPER SHIFT, C

# ── WORKSPACE KISAYOLLARI ─────────────────────────────────────────────
$mainMod = SUPER

# ── SPECIAL WORKSPACE'LER ─────────────────────────────────────────────
# caelestia toggle ile açılır/kapanır (cli.json ile tanımlanır)
$kbSystemMonitor  = SUPER ALT, M
$kbMusic          = SUPER ALT, S
$kbCommunication  = SUPER ALT, D
