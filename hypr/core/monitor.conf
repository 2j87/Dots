# ── MONITOR.CONF ──────────────────────────────────────────────────────
# Monitör konfigürasyonu.
# Sözdizimi: monitor = <isim>, <çözünürlük>@<hz>, <konum>, <ölçek>
#
# Mevcut monitörleri görmek için: hyprctl monitors
# Tüm bilinmeyen monitörleri otomatik algıla:

monitor = , preferred, auto, 1

# ── TEK MONİTÖR ÖRNEĞİ ───────────────────────────────────────────────
# Kendi monitör adını ve çözünürlüğünü girerek aşağıdaki satırı aktif et:
# monitor = eDP-1, 1920x1080@60, 0x0, 1

# ── ÇOKLU MONİTÖR ÖRNEĞİ ─────────────────────────────────────────────
# monitor = eDP-1,  1920x1080@60, 0x0,    1        # laptop ekranı (sol)
# monitor = HDMI-A-1, 2560x1440@144, 1920x0, 1    # harici monitör (sağ)

# ── WORKSPACE-MONİTÖR BAĞLAMASI ───────────────────────────────────────
# Belirli workspace'leri belirli monitörlere sabitlemek için:
# workspace = 1, monitor:eDP-1, default:true
# workspace = 2, monitor:eDP-1
# workspace = 6, monitor:HDMI-A-1, default:true
