# ── GESTURES.CONF ─────────────────────────────────────────────────────
# Touchpad jest (gesture) konfigürasyonu.
# Workspace'ler arası geçiş için 3 parmak kaydırma.

gestures {
    # 3/4 parmak yatay kaydırma ile workspace geçişi
    workspace_swipe              = true
    workspace_swipe_fingers      = 3
    workspace_swipe_distance     = 250    # px, ne kadar kaydırılacak
    workspace_swipe_invert       = true   # kaydırma yönü (natural = true)
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5    # yarısından fazlası = commit
    workspace_swipe_create_new   = false  # son workspace'de yeni oluşturma
    workspace_swipe_forever      = false

    # Touchscreen kenar kaydırma
    workspace_swipe_touch        = false
}
