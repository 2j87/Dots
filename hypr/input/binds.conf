# ── BINDS.CONF ────────────────────────────────────────────────────────
# Tüm tuş kısayolları.
# Değişkenler core/variables.conf dosyasından gelir.
#
# Sözdizimi: bind = MOD, TUŞ, eylem, parametre
# bind  = tek basış
# bindm = fare ile (move/resize)
# bindl = kilit ekranında da aktif
# binde = basılı tutunca tekrarla
# bindr = bırakınca tetikle
# bindi = submap içinde

# ── CAELESTIA GLOBAL SHORTCUT SİSTEMİ ────────────────────────────────
# Caelestia shell, Hyprland'ın global shortcut altyapısını kullanır.
# Shell başladıktan sonra submap global'a geçilir.
exec = hyprctl dispatch submap global
submap = global

# Launcher (Super tuşuna basıp bırakma)
bindi  = SUPER, Super_L,        global, caelestia:launcher
bindin = SUPER, catchall,       global, caelestia:launcherInterrupt
bindin = SUPER, mouse:272,      global, caelestia:launcherInterrupt
bindin = SUPER, mouse:273,      global, caelestia:launcherInterrupt
bindin = SUPER, mouse:274,      global, caelestia:launcherInterrupt

# Caelestia panel kısayolları
bind   = $kbSession,            global, caelestia:session
bind   = $kbShowSidebar,        global, caelestia:sidebar

submap = reset

# ── UYGULAMALAR ───────────────────────────────────────────────────────
bind = $mainMod,       T,       exec, $terminal
bind = $mainMod,       W,       exec, $browser
bind = $mainMod,       E,       exec, $filemanager
bind = $mainMod,       C,       exec, $editor

# ── PENCERE YÖNETİMİ ──────────────────────────────────────────────────
bind  = $mainMod,           Q,      killactive
bind  = $mainMod,           F,      fullscreen, 0
bind  = $mainMod SHIFT,     F,      fullscreen, 1          # maximize (bar'ı gizlemez)
bind  = $mainMod,           Space,  togglefloating
bind  = $mainMod,           P,      pseudo                  # dwindle pseudo tile
bind  = $mainMod,           J,      togglesplit             # dwindle split yönü

# Pencere odak hareketi (HJKL / ok tuşları)
bind  = $mainMod, left,  movefocus, l
bind  = $mainMod, right, movefocus, r
bind  = $mainMod, up,    movefocus, u
bind  = $mainMod, down,  movefocus, d
bind  = $mainMod, H,     movefocus, l
bind  = $mainMod, L,     movefocus, r
bind  = $mainMod, K,     movefocus, u
bind  = $mainMod, J,     movefocus, d

# Pencere taşıma
bind  = $mainMod SHIFT, left,  movewindow, l
bind  = $mainMod SHIFT, right, movewindow, r
bind  = $mainMod SHIFT, up,    movewindow, u
bind  = $mainMod SHIFT, down,  movewindow, d
bind  = $mainMod SHIFT, H,     movewindow, l
bind  = $mainMod SHIFT, L,     movewindow, r
bind  = $mainMod SHIFT, K,     movewindow, u
bind  = $mainMod SHIFT, J,     movewindow, d

# Pencere boyutlandırma
binde = $mainMod CTRL, left,  resizeactive, -20 0
binde = $mainMod CTRL, right, resizeactive, 20 0
binde = $mainMod CTRL, up,    resizeactive, 0 -20
binde = $mainMod CTRL, down,  resizeactive, 0 20

# Fare ile pencere taşıma/yeniden boyutlandırma
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

# ── WORKSPACE GEÇİŞİ ─────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Pencereyi workspace'e taşı
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Önceki/sonraki workspace
bind = $mainMod, Tab,       workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1

# Scroll ile workspace geçişi
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── SPECIAL WORKSPACE (SCRATCHPAD) ────────────────────────────────────
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspacesilent,  special:magic

# Caelestia toggle sistemi (cli.json ile tanımlanır)
bind = $kbSystemMonitor, exec, caelestia toggle sysmon
bind = $kbMusic,         exec, caelestia toggle music
bind = $kbCommunication, exec, caelestia toggle communication

# ── EKRan görüntüsü ve kayıt ─────────────────────────────────────────
bind = $kbScreenshot,     exec, caelestia screenshot
bind = $kbScreenshotArea, exec, caelestia screenshot -a
bind = $kbRecord,         exec, caelestia record
bind = $kbClipboard,      exec, caelestia clipboard
bind = $kbEmoji,          exec, caelestia emoji
bind = $kbColorPicker,    exec, caelestia shell picker open

# ── SES KONTROLÜ ──────────────────────────────────────────────────────
# Caelestia shell'in bar'ı scroll ile ses ayarlar, ama tuş kısayolları da lazım:
bindl = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── PARLALIK ──────────────────────────────────────────────────────────
bindl = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── MEDYA ─────────────────────────────────────────────────────────────
bindl = , XF86AudioPlay,         exec, playerctl play-pause
bindl = , XF86AudioNext,         exec, playerctl next
bindl = , XF86AudioPrev,         exec, playerctl previous
bindl = SUPER CTRL, Space,       exec, playerctl play-pause

# ── HYPRLAND ──────────────────────────────────────────────────────────
bind = $mainMod SHIFT, E,     exit
bind = $mainMod SHIFT, R,     exec, hyprctl reload
bind = SUPER CTRL ALT, R,     exec, caelestia shell restart
