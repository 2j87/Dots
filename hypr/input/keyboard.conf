# ── KEYBOARD.CONF ─────────────────────────────────────────────────────
# Klavye düzeni, fare ve touchpad ayarları.
# Eski kblayout.conf + input genel ayarları tek dosyada birleştirildi.

input {
    # ── KLAVYE ────────────────────────────────────────────────────────
    kb_layout   = tr           # Türkçe Q klavye
    kb_variant  =
    kb_model    =
    kb_options  =
    kb_rules    =

    # Caps Lock davranışı (opsiyonel override):
    # kb_options = caps:escape   # Caps Lock → Escape
    # kb_options = caps:swapescape # Caps Lock ↔ Escape swap

    # ── FARE ──────────────────────────────────────────────────────────
    sensitivity    = 0.0       # -1.0 ile 1.0 arası, 0 = değişiklik yok
    accel_profile  = flat      # flat = hız artışsız, adaptive = sistem default

    # ── ODAK DAVRANIŞI ────────────────────────────────────────────────
    # 0: odak değişmez | 1: daima odaklan | 2: mouse/klavye ayrı | 3: tam ayrı
    follow_mouse   = 1

    # Pencere üzerine gelince odaklan (hover focus)
    mouse_refocus  = true

    # ── TOUCHPAD ──────────────────────────────────────────────────────
    touchpad {
        disable_while_typing    = true
        natural_scroll          = true    # ters kaydırma (macOS tarzı)
        tap-to-click            = true    # tıkla ile tıklama
        tap_button_map          = lrm     # 1 parmak=sol, 2=sağ, 3=orta
        drag_lock               = false
        scroll_factor           = 1.0
        clickfinger_behavior    = false
    }
}
